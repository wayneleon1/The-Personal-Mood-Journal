<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Personal Mood Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-deco" aria-hidden="true">
          <span class="deco-line"></span>
          <span class="deco-ornament">✦</span>
          <span class="deco-line"></span>
        </div>
        <p class="journal-label">📔 Personal Mood Journal</p>
        <h1>How are you <em>feeling</em> today?</h1>
        <p class="header-sub">
          A private space for your thoughts and emotions.
        </p>
        <div class="header-deco" aria-hidden="true">
          <span class="deco-line"></span>
          <span class="deco-ornament">✦</span>
          <span class="deco-line"></span>
        </div>
      </header>

      <div class="app-grid">
        <!-- Form Section -->
        <div class="card card--form">
          <h2>New Entry</h2>
          <form id="entry-form" novalidate>
            <div class="form-group">
              <label for="title">Title</label>
              <input
                type="text"
                id="title"
                name="title"
                placeholder="What's on your mind?"
                required
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label for="content">Your Thoughts</label>
              <textarea
                id="content"
                name="content"
                rows="5"
                placeholder="Write freely — this is your space…"
                required
              ></textarea>
            </div>

            <div class="form-group">
              <label>How are you feeling?</label>
              <div
                class="mood-picker"
                role="radiogroup"
                aria-label="Select your mood"
              >
                <input
                  type="radio"
                  id="mood-happy"
                  name="mood"
                  value="happy"
                  required
                />
                <label for="mood-happy" class="mood-option" title="Happy">
                  <span class="mood-emoji">😊</span>
                  <span class="mood-label">Happy</span>
                </label>

                <input type="radio" id="mood-calm" name="mood" value="calm" />
                <label for="mood-calm" class="mood-option" title="Calm">
                  <span class="mood-emoji">😌</span>
                  <span class="mood-label">Calm</span>
                </label>

                <input
                  type="radio"
                  id="mood-motivated"
                  name="mood"
                  value="motivated"
                />
                <label
                  for="mood-motivated"
                  class="mood-option"
                  title="Motivated"
                >
                  <span class="mood-emoji">💪</span>
                  <span class="mood-label">Motivated</span>
                </label>

                <input type="radio" id="mood-sad" name="mood" value="sad" />
                <label for="mood-sad" class="mood-option" title="Sad">
                  <span class="mood-emoji">😔</span>
                  <span class="mood-label">Sad</span>
                </label>

                <input
                  type="radio"
                  id="mood-stressed"
                  name="mood"
                  value="stressed"
                />
                <label for="mood-stressed" class="mood-option" title="Stressed">
                  <span class="mood-emoji">😰</span>
                  <span class="mood-label">Stressed</span>
                </label>
              </div>
            </div>

            <!-- Hidden select kept for JS compatibility with ui.ts -->
            <select
              id="mood"
              name="mood-legacy"
              style="display: none"
              aria-hidden="true"
              tabindex="-1"
            >
              <option value="happy">Happy</option>
              <option value="sad">Sad</option>
              <option value="motivated">Motivated</option>
              <option value="stressed">Stressed</option>
              <option value="calm">Calm</option>
            </select>

            <button type="submit" id="submit-btn">
              <span class="btn-icon">✒</span>
              <span>Save Entry</span>
            </button>
          </form>
        </div>

        <!-- Entries Section -->
        <div class="card card--entries">
          <div class="entries-header">
            <h2>Past Entries</h2>
            <div>
              <span class="filter-label">Filter by mood</span>
              <div class="filter-chips" id="filter-chips">
                <button class="chip chip--active" data-mood="all">All</button>
                <button class="chip" data-mood="happy">😊</button>
                <button class="chip" data-mood="calm">😌</button>
                <button class="chip" data-mood="motivated">💪</button>
                <button class="chip" data-mood="sad">😔</button>
                <button class="chip" data-mood="stressed">😰</button>
              </div>
            </div>
          </div>

          <!-- Hidden select for JS bindFilterChange compatibility -->
          <select
            id="filter-mood"
            style="display: none"
            aria-hidden="true"
            tabindex="-1"
          >
            <option value="all">All entries</option>
            <option value="happy">Happy</option>
            <option value="sad">Sad</option>
            <option value="motivated">Motivated</option>
            <option value="stressed">Stressed</option>
            <option value="calm">Calm</option>
          </select>

          <div id="entries-container" class="entries-container"></div>

          <div class="entries-empty" id="entries-empty" hidden>
            <span class="empty-icon">📖</span>
            <p>No entries yet.<br />Start writing your story.</p>
          </div>
        </div>
      </div>

      <footer>
        <span class="deco-ornament small">✦</span>
        <p>Your journal lives safely in your browser. No account needed.</p>
      </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module">
      import { init } from "/dist/journal.js";
      init();

      // Sync radio mood picker → hidden select (for ui.ts getFormData compatibility)
      document.querySelectorAll('input[name="mood"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          document.getElementById("mood").value = radio.value;
        });
      });

      // Filter chips → hidden select
      const chips = document.querySelectorAll(".chip");
      const filterSelect = document.getElementById("filter-mood");

      chips.forEach((chip) => {
        chip.addEventListener("click", () => {
          chips.forEach((c) => c.classList.remove("chip--active"));
          chip.classList.add("chip--active");
          filterSelect.value = chip.dataset.mood;
          filterSelect.dispatchEvent(new Event("change"));
        });
      });

      // Toast helper
      window.showToast = (msg, type = "success") => {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.className = `toast toast--${type} toast--show`;
        setTimeout(() => {
          toast.className = "toast";
        }, 2800);
      };

      // Show toast on save
      document.getElementById("entry-form").addEventListener("submit", () => {
        setTimeout(() => window.showToast("Entry saved ✓"), 100);
      });
    </script>
  </body>
</html>
